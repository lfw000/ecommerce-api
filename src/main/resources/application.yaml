spring:
  application:
    name: ecommerce-api

  # JACKSON CONFIGURATION
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  # FLYWAY CONFIGURATION
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    table: flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 1
    encoding: UTF-8

  # JPA COMMON CONFIGURATION
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: false
        default_schema: public
    database: postgresql

  # SERVLET MULTIPART CONFIGURATION (FOR IMAGES)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# SERVER CONFIGURATION
server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    connection-timeout: 20000
    max-connections: 200
    threads:
      max: 200
      min-spare: 10

# JWT CONFIGURATION
app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION:900000}
    refresh-expiration-ms: 604800000

# LOGGING
#logging:
#  pattern:
#    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
#    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
#  logback:
#    rollingpolicy:
#      max-file-size: 10MB
#      max-history: 30

# ACTUATOR CONFIGURATION
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
    metrics:
      access: unrestricted
    info:
      env:
        enabled: true

# RATE LIMITING
rate-limiting:
  enabled: true
  login:
    capacity: 5
    refill-time: 60
  register:
    capacity: 10
    refill-time: 60
  general:
    capacity: 100
    refill-time: 60
  order-creation:
    capacity: 20
    refill-time: 60
  payment-processing:
    capacity: 10
    refill-time: 60

# INFO ENDPOINT
info:
  app:
    name: "E-commerce API"
    version: 1.0.0
    description: "E-commerce platform REST API"
