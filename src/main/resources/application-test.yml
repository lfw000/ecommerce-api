spring:
  config:
    activate:
      on-profile: test

  # DATASOURCE (H2)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      maximum-pool-size: 2
      connection-timeout: 10000

  # JPA
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        jdbc:
          batch_size: 5
    database: h2
    database-platform: org.hibernate.dialect.H2Dialect

  # H2 CONSOLE (OPTIONAL FOR DEBUG)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # FLYWAY
  flyway:
    enabled: false

# LOGGING (MINIMUM)
logging:
  level:
    com.spring.luispa.ecommerce_api: DEBUG
    org.springframework.test: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: WARN
    org.flywaydb: WARN

# JWT
app:
  jwt:
    secret: testSecretKeyForUnitTests1234567890
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000

# RATE LIMITING
rate-limiting:
  enabled: false

# CORS
cors:
  allowed-origins:
    - "*"
    -
# SWAGGER
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false